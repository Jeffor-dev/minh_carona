<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle de Transporte</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      background: #f5f7fb;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
    }

    h3 {
      margin-bottom: 10px;
      color: #555;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      flex: 1;
    }

    input:focus, select:focus {
      border-color: #4f46e5;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    .danger {
      background: #ef4444;
    }

    .danger:hover {
      background: #dc2626;
    }

    .secondary {
      background: #10b981;
    }

    .secondary:hover {
      background: #059669;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th {
      background: #f1f5f9;
      font-weight: 600;
      padding: 10px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    tr:hover {
      background: #fafafa;
    }

    .total {
      margin-top: 15px;
      font-size: 22px;
      font-weight: 600;
      text-align: right;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badge {
      background: #eef2ff;
      color: #4f46e5;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    @media(max-width: 600px) {
      .row {
        flex-direction: column;
      }

      .top-bar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <h2>🚗 Transporte</h2>
    <span class="badge">Controle mensal</span>
  </div>

  <!-- FILTRO -->
  <h3>Mês</h3>
  <div class="row">
    <select id="mes"></select>
    <select id="ano"></select>
    <button onclick="carregar()">Carregar</button>
  </div>

  <!-- FORM -->
  <h3>Adicionar / Editar</h3>
  <div class="row">
    <input type="date" id="dataManual">
    <select id="tipoManual">
      <option value="0">-</option>
      <option value="1">Ida</option>
      <option value="2">Volta</option>
      <option value="3">Ida e Volta</option>
    </select>
    <button class="secondary" onclick="salvarManual()">Salvar</button>
  </div>

  <!-- TABELA -->
  <h3>Registros</h3>

  <table>
    <thead>
      <tr>
        <th>Data</th>
        <th>Status</th>
        <th>Valor</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>

  <div class="total">
    Total: R$ <span id="total">0.00</span>
  </div>

  <br>
  <button onclick="gerarPDF()">📄 Gerar PDF</button>

</div>

<script>
const VALOR = 5.5;

function calcular(tipo) {
  if (tipo == 1 || tipo == 2) return VALOR;
  if (tipo == 3) return VALOR * 2;
  return 0;
}

function formatarData(data) {
  const [ano, mes, dia] = data.split('-');
  return `${dia}/${mes}/${ano}`;
}

function initFiltro() {
  const mesSelect = document.getElementById('mes');
  const anoSelect = document.getElementById('ano');

  for (let i = 1; i <= 12; i++) {
    mesSelect.innerHTML += `<option value="${String(i).padStart(2,'0')}">${i}</option>`;
  }

  const anoAtual = new Date().getFullYear();
  for (let i = anoAtual - 2; i <= anoAtual + 1; i++) {
    anoSelect.innerHTML += `<option value="${i}">${i}</option>`;
  }

  mesSelect.value = String(new Date().getMonth() + 1).padStart(2,'0');
  anoSelect.value = anoAtual;
}

async function carregar() {
  const mes = document.getElementById('mes').value;
  const ano = document.getElementById('ano').value;

  const res = await fetch(`/dias?mes=${mes}&ano=${ano}`);
  const dados = await res.json();

  // 🔥 ordenação correta
  dados.sort((a, b) => a.data.localeCompare(b.data));

  const tabela = document.getElementById('tabela');
  tabela.innerHTML = '';

  let total = 0;

  dados.forEach(d => {
    const valor = calcular(d.tipo);
    total += valor;

    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${formatarData(d.data)}</td>
      <td>
        <select onchange="salvar('${d.data}', this.value)">
          <option value="0" ${d.tipo==0?'selected':''}>-</option>
          <option value="1" ${d.tipo==1?'selected':''}>Ida</option>
          <option value="2" ${d.tipo==2?'selected':''}>Volta</option>
          <option value="3" ${d.tipo==3?'selected':''}>Ida e Volta</option>
        </select>
      </td>
      <td>R$ ${valor.toFixed(2)}</td>
      <td>
        <button class="danger" onclick="excluir('${d.data}', this)">🗑</button>
      </td>
    `;

    tabela.appendChild(tr);
  });

  document.getElementById('total').textContent = total.toFixed(2);
}

async function salvar(data, tipo) {
  if (parseInt(tipo) === 0) {
    await fetch(`/dia/${data}`, { method: 'DELETE' });
  } else {
    await fetch('/dia', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ data, tipo: parseInt(tipo) })
    });
  }

  carregar();
}

async function salvarManual() {
  const data = document.getElementById('dataManual').value;
  const tipo = parseInt(document.getElementById('tipoManual').value);

  if (!data) return alert('Escolha uma data');

  await fetch('/dia', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ data, tipo })
  });

  carregar();
}

async function excluir(data, btn) {
  if (!confirm('Excluir este dia?')) return;

  await fetch(`/dia/${data}`, { method: 'DELETE' });

  btn.closest('tr').remove();
  recalcularTotal();
}

function recalcularTotal() {
  let total = 0;

  document.querySelectorAll('#tabela tr').forEach(tr => {
    const valor = tr.children[2].textContent.replace('R$', '').trim();
    total += parseFloat(valor);
  });

  document.getElementById('total').textContent = total.toFixed(2);
}

function gerarPDF() {
  const mes = document.getElementById('mes').value;
  const ano = document.getElementById('ano').value;

  window.open(`/pdf?mes=${mes}&ano=${ano}`);
}

// auto preencher
document.getElementById('dataManual').addEventListener('change', async (e) => {
  const data = e.target.value;

  const res = await fetch('/dias');
  const dados = await res.json();

  const dia = dados.find(d => d.data === data);

  document.getElementById('tipoManual').value = dia ? dia.tipo : 0;
});

initFiltro();
carregar();
</script>

</body>
</html>
